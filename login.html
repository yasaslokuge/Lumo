<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Lumo — Log in</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Hanken+Grotesk:wght@400;500;600;700&family=Sacramento&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; background: #e7e3d8;
    font-family: 'Hanken Grotesk', sans-serif;
  }

  @keyframes lumoScreenIn { from { opacity: 0; transform: translateX(28px) scale(0.98); } to { opacity: 1; transform: none; } }
  @keyframes lumoRise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  @keyframes lumoReveal { from { opacity: 0; clip-path: inset(0 0 108% 0); transform: translateY(10px); } to { opacity: 1; clip-path: inset(-25% 0 -25% 0); transform: none; } }
  @keyframes lumoBloom { 0% { opacity: 0; transform: translate(-50%,-50%) scale(0.12); } 30% { opacity: 0.95; } 58% { opacity: 0.78; } 100% { opacity: 0; transform: translate(-50%,-50%) scale(3.3); } }
  @keyframes lumoFlash { 0% { opacity: 0; transform: translate(-50%,-50%) scale(0.2); } 20% { opacity: 0.9; } 100% { opacity: 0; transform: translate(-50%,-50%) scale(2.7); } }
  @keyframes lumoSpark { 0% { opacity: 0; transform: translate(-50%,-50%) scale(0) rotate(0deg); } 22% { opacity: 1; transform: translate(-50%,-50%) scale(1) rotate(20deg); } 55% { opacity: 1; transform: translate(-50%,-50%) scale(1.15) rotate(30deg); } 100% { opacity: 0; transform: translate(-50%,-50%) scale(2.7) rotate(64deg); } }
  @keyframes lumoContentIn { from { opacity: 0; transform: translateY(16px); filter: blur(8px); } to { opacity: 1; transform: none; filter: blur(0); } }
  @keyframes lumoShine { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
  @keyframes lumoFloat { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(14px,-18px) scale(1.06); } }

  .lumo-phone {
    width: 100%; max-width: 480px; min-height: 100vh; position: relative; overflow: hidden;
    background: #F4F1EA; font-family: 'Hanken Grotesk', sans-serif; color: #211E18;
    animation: lumoScreenIn 0.5s cubic-bezier(0.22,0.9,0.28,1) both;
  }
  @media (min-width: 481px) {
    .lumo-phone { box-shadow: 0 30px 80px -30px rgba(40,34,22,0.35); }
  }

  .blob { position: absolute; border-radius: 50%; }
  .blob-a { top: -90px; right: -70px; width: 280px; height: 280px; background: radial-gradient(circle at 30% 30%, oklch(0.86 0.05 150), transparent 70%); opacity: 0.7; animation: lumoFloat 14s ease-in-out infinite; }
  .blob-b { bottom: 120px; left: -80px; width: 240px; height: 240px; background: radial-gradient(circle at 40% 40%, oklch(0.88 0.045 60), transparent 70%); opacity: 0.6; animation: lumoFloat 18s ease-in-out infinite reverse; }

  .intro-bloom { position: absolute; inset: 0; overflow: hidden; pointer-events: none; z-index: 5; }
  .intro-bloom .b1 { position: absolute; top: 44%; left: 47%; width: 340px; height: 340px; border-radius: 50%; background: radial-gradient(circle, oklch(0.82 0.1 155 / 0.9), transparent 65%); filter: blur(28px); animation: lumoBloom 1.8s ease-out 0.28s both; }
  .intro-bloom .b2 { position: absolute; top: 40%; left: 56%; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, oklch(0.87 0.075 72 / 0.85), transparent 64%); filter: blur(30px); animation: lumoBloom 1.9s ease-out 0.42s both; }
  .intro-bloom .b3 { position: absolute; top: 50%; left: 52%; width: 280px; height: 280px; border-radius: 50%; background: radial-gradient(circle, oklch(0.79 0.09 150 / 0.8), transparent 62%); filter: blur(26px); animation: lumoBloom 1.9s ease-out 0.52s both; }
  .intro-bloom .flash { position: absolute; top: 44%; left: 50%; width: 170px; height: 170px; border-radius: 50%; background: radial-gradient(circle, oklch(0.99 0.02 120 / 0.95), transparent 60%); filter: blur(14px); animation: lumoFlash 1.2s ease-out 0.22s both; }
  .intro-bloom .spark { position: absolute; top: 44%; left: 50%; width: 66px; height: 66px; background: linear-gradient(135deg, oklch(0.96 0.03 120), oklch(0.68 0.1 155)); clip-path: polygon(50% 0,60% 40%,100% 50%,60% 60%,50% 100%,40% 60%,0 50%,40% 40%); filter: drop-shadow(0 0 14px oklch(0.8 0.1 155 / 0.85)); animation: lumoSpark 1.45s cubic-bezier(0.4,0,0.2,1) 0.05s both; }

  .content {
    position: relative; z-index: 10; min-height: 100vh; display: flex; flex-direction: column;
    padding: 40px 30px 30px; animation: lumoContentIn 0.9s cubic-bezier(0.22,0.9,0.28,1) 1.05s both;
  }

  .wordmark { display: flex; align-items: center; gap: 9px; margin-bottom: auto; }
  .logo { width: 30px; height: 30px; border-radius: 9px; background: oklch(0.48 0.058 158); display: flex; align-items: center; justify-content: center; color: #F4F1EA; font-family: 'Instrument Serif', serif; font-size: 20px; line-height: 1; }
  .brand { font-family: 'Instrument Serif', serif; font-size: 22px; letter-spacing: 0.01em; }

  .hero { min-height: 186px; display: flex; flex-direction: column; justify-content: flex-end; margin-bottom: 26px; }
  .hero-kicker { font-size: 13px; letter-spacing: 0.14em; text-transform: uppercase; color: oklch(0.48 0.058 158); font-weight: 600; margin-bottom: 2px; animation: lumoRise 0.5s ease both; }
  .hero-name-wrap { display: inline-block; position: relative; }
  .hero-name {
    font-family: 'Sacramento', cursive; font-size: 66px; line-height: 1.28; white-space: nowrap;
    padding: 2px 16px 6px 8px; overflow: visible;
    background: linear-gradient(100deg, oklch(0.42 0.07 158) 0%, oklch(0.55 0.12 155) 22%, oklch(0.82 0.16 140) 42%, oklch(0.95 0.08 130) 50%, oklch(0.82 0.16 140) 58%, oklch(0.55 0.12 155) 78%, oklch(0.42 0.07 158) 100%);
    background-size: 200% 100%; -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent;
    animation: lumoShine 3.2s linear infinite, lumoReveal 0.6s cubic-bezier(0.22,0.9,0.28,1) both;
  }
  .hero-noname-kicker { font-size: 15px; letter-spacing: 0.14em; text-transform: uppercase; color: oklch(0.48 0.058 158); font-weight: 600; margin-bottom: 6px; }
  .hero-headline { font-family: 'Instrument Serif', serif; font-size: 52px; line-height: 1.04; color: #211E18; }
  .hero-headline em { font-style: italic; }

  .form { display: flex; flex-direction: column; gap: 12px; }
  .field { display: block; position: relative; }
  .field-label { position: absolute; top: 11px; left: 18px; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: #9A917F; font-weight: 600; pointer-events: none; }
  .lumo-input {
    width: 100%; padding: 30px 18px 12px; border: 1px solid rgba(33,30,24,0.12);
    background: rgba(255,255,255,0.75); border-radius: 16px; font-family: 'Hanken Grotesk', sans-serif;
    font-size: 17px; color: #211E18; outline: none; backdrop-filter: blur(4px);
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  .lumo-input:focus { border-color: oklch(0.48 0.058 158); box-shadow: 0 0 0 4px oklch(0.48 0.058 158 / 0.1); }

  .lumo-btn-primary {
    margin-top: 4px; width: 100%; padding: 17px; border: none; border-radius: 16px;
    background: oklch(0.48 0.058 158); color: #F4F1EA; font-family: 'Hanken Grotesk', sans-serif;
    font-size: 16px; font-weight: 600; letter-spacing: 0.01em; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: transform 0.15s ease, background 0.2s ease;
  }
  .lumo-btn-primary:hover { background: oklch(0.43 0.06 158); }
  .lumo-btn-primary:active { transform: scale(0.985); }
  .lumo-btn-primary .arrow { font-size: 18px; }

  .divider { display: flex; align-items: center; gap: 12px; margin: 6px 0 2px; }
  .divider .line { flex: 1; height: 1px; background: rgba(33,30,24,0.1); }
  .divider-text { font-size: 12px; color: #9A917F; letter-spacing: 0.04em; }

  .social-row { display: flex; gap: 10px; }
  .lumo-btn-social {
    flex: 1; padding: 13px; border: 1px solid rgba(33,30,24,0.14); border-radius: 14px;
    background: rgba(255,255,255,0.6); font-family: 'Hanken Grotesk', sans-serif; font-size: 14px;
    font-weight: 600; color: #211E18; cursor: pointer; transition: background 0.2s ease;
  }
  .lumo-btn-social:hover { background: #fff; }

  .signup-text { text-align: center; font-size: 14px; color: #6E6656; margin-top: 18px; }
  .signup-link { color: oklch(0.48 0.058 158); font-weight: 600; cursor: pointer; }

  .hidden { display: none !important; }
</style>
</head>
<body>
  <div class="lumo-phone" id="phone">
    <div class="blob blob-a"></div>
    <div class="blob blob-b"></div>

    <div class="intro-bloom">
      <div class="b1"></div>
      <div class="b2"></div>
      <div class="b3"></div>
      <div class="flash"></div>
      <div class="spark"></div>
    </div>

    <div class="content">
      <div class="wordmark">
        <div class="logo">L</div>
        <span class="brand">Lumo</span>
      </div>

      <div class="hero">
        <div id="heroNoName">
          <div class="hero-noname-kicker">Learn English</div>
          <div class="hero-headline">Fluency,<br><em>made calm.</em></div>
        </div>
        <div id="heroHasName" class="hidden">
          <div class="hero-kicker">Welcome back</div>
          <div class="hero-name-wrap"><div class="hero-name" id="heroName"></div></div>
        </div>
      </div>

      <div class="form">
        <label class="field">
          <span class="field-label">Username</span>
          <input id="usernameInput" class="lumo-input" placeholder="yourname" autocomplete="off" spellcheck="false">
        </label>
        <label class="field">
          <span class="field-label">Password</span>
          <input type="password" class="lumo-input" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;">
        </label>

        <button id="continueBtn" class="lumo-btn-primary" type="button">
          <span id="ctaLabel">Log in</span><span class="arrow">&rarr;</span>
        </button>

        <div class="divider"><span class="line"></span><span class="divider-text">or continue with</span><span class="line"></span></div>

        <div class="social-row">
          <button class="lumo-btn-social" type="button">Google</button>
          <button class="lumo-btn-social" type="button">Apple</button>
        </div>
      </div>

      <div class="signup-text">New to Lumo? <span class="signup-link">Create account</span></div>
    </div>
  </div>

<script>
  const usernameInput = document.getElementById('usernameInput');
  const heroNoName = document.getElementById('heroNoName');
  const heroHasName = document.getElementById('heroHasName');
  const heroName = document.getElementById('heroName');
  const ctaLabel = document.getElementById('ctaLabel');
  const continueBtn = document.getElementById('continueBtn');

  function titleCase(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

  function currentFirstName() {
    const raw = usernameInput.value || '';
    const name = raw.trim();
    const first = name.split(/\s+/)[0] || '';
    return first ? titleCase(first) : '';
  }

  function update() {
    const pretty = currentFirstName();
    const hasName = pretty.length > 0;
    heroName.textContent = pretty;
    heroNoName.classList.toggle('hidden', hasName);
    heroHasName.classList.toggle('hidden', !hasName);
    ctaLabel.textContent = hasName ? `Start learning, ${pretty}` : 'Log in';
  }

  usernameInput.addEventListener('input', update);

  // Prefill from a previous visit, if any
  try {
    const saved = localStorage.getItem('lumo:name');
    if (saved) usernameInput.value = saved;
  } catch (e) {}
  update();

  function goToDashboard() {
    const pretty = currentFirstName();
    try { localStorage.setItem('lumo:name', pretty); } catch (e) {}
    if (window.parent && window.parent !== window) {
      window.parent.postMessage({ type: 'lumo:continue', name: pretty }, '*');
    } else {
      window.location.href = 'dashboard.html' + (pretty ? ('?name=' + encodeURIComponent(pretty)) : '');
    }
  }

  continueBtn.addEventListener('click', goToDashboard);
  usernameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') goToDashboard(); });
</script>
</body>
</html>

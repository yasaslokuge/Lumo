<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Lumo</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; background: #e7e3d8;
    font-family: sans-serif;
  }
  @keyframes lumoScreenIn { from { opacity: 0; transform: translateX(28px) scale(0.98); } to { opacity: 1; transform: none; } }
  .stage { width: 390px; height: 844px; position: relative; border-radius: 44px; }
  .stage iframe {
    position: absolute; inset: 0; width: 390px; height: 844px; border: 0; border-radius: 44px; background: transparent;
  }
  .screen-enter { animation: lumoScreenIn 0.5s cubic-bezier(0.22,0.9,0.28,1) both; }
</style>
</head>
<body>
  <div class="stage">
    <iframe id="screenFrame" class="screen-enter" src="login.html" title="Lumo"></iframe>
  </div>

<script>
  // Mirrors the state machine in the original Lumo App.dc.html:
  //   state = { step: "login" }
  //   onLogin  -> imports "Lumo Login v3", passes onContinue -> goDashboard
  //   onDashboard -> imports "Lumo Dashboard"
  const frame = document.getElementById('screenFrame');
  let step = 'login';

  function goTo(nextStep, name) {
    if (step === nextStep) return;
    step = nextStep;
    const url = nextStep === 'dashboard'
      ? 'dashboard.html' + (name ? ('?name=' + encodeURIComponent(name)) : '')
      : 'login.html';

    // Replay the screen-in transition on navigation, same as the original app shell.
    frame.classList.remove('screen-enter');
    void frame.offsetWidth; // force reflow so the animation can restart
    frame.src = url;
    frame.classList.add('screen-enter');
  }

  window.addEventListener('message', (event) => {
    const data = event.data || {};
    if (data.type === 'lumo:continue') {
      goTo('dashboard', data.name);
    }
  });
</script>
</body>
</html>
